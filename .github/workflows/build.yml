name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"] # 버전 태그(v0.2.0 등)를 푸시하면 release-windows 가 GitHub Releases 에 게시
  pull_request:

jobs:
  # Platform-neutral Core + tests build and run on Linux (fast feedback).
  core-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: |
          dotnet restore src/SilentStream.Core/SilentStream.Core.csproj
          dotnet restore tests/SilentStream.Tests/SilentStream.Tests.csproj
      - name: Build Core
        run: dotnet build src/SilentStream.Core/SilentStream.Core.csproj -c Release --no-restore
      - name: Build room provisioning server
        run: dotnet build src/SilentStream.ProvisioningServer/SilentStream.ProvisioningServer.csproj -c Release
      - name: Test
        run: dotnet test tests/SilentStream.Tests/SilentStream.Tests.csproj -c Release
      - name: Compile Windows media project (cross-targeting)
        run: dotnet build src/SilentStream.Media.Windows/SilentStream.Media.Windows.csproj -c Release

  # Full solution (incl. the WPF host) builds only on Windows.
  full-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build solution
        run: dotnet build SilentStream.sln -c Release

  # Builds the Velopack release (Setup.exe + full/delta packages + release feed) and
  # publishes it to GitHub Releases. The app's AppUpdateManager reads this feed every
  # 6h and self-updates. Runs ONLY on a version tag (vX.Y.Z); regular pushes just build.
  #
  # Required repo secret: OAUTH_CLIENT_SECRET_JSON (the Google desktop OAuth client JSON).
  # It is bundled into the package so a fresh install needs no manual secret copy.
  release-windows:
    needs: full-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write # GitHub Release 생성 + 자산 업로드(기본 GITHUB_TOKEN)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # 태그(v0.2.0)에서 패키지 버전을 추출한다.
      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          # 프리릴리스 판별: 태그에 SemVer 프리릴리스 접미사(예: v0.3.0-rc.1)가 있으면 GitHub
          # 릴리스를 pre-release 로 게시한다. 앱 자동업데이트는 GithubSource(prerelease:false)라
          # pre-release 를 건너뛰므로, 현장 배포본(정식 릴리스)에 영향 없이 RC 를 올려 검증 가능.
          $pre = if ($v -match '-') { 'true' } else { 'false' }
          "pre=$pre" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Release version: $v (prerelease=$pre)"

      # 1) WPF 호스트를 self-contained 로 publish (대상 PC에 .NET/ASP.NET Core 런타임 불필요).
      - name: Publish app (self-contained, win-x64)
        run: >
          dotnet publish src/SilentStream.App/SilentStream.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=false
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      - name: Publish remote uninstall helper
        run: >
          dotnet publish src/SilentStream.UninstallHelper/SilentStream.UninstallHelper.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -o publish/uninstall-helper

      # 2) static ffmpeg.exe 를 publish/ffmpeg/ 에 동봉(FfmpegLocator 가 BaseDirectory\ffmpeg\ffmpeg.exe 탐색).
      - name: Bundle FFmpeg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $exe = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $exe) { throw "ffmpeg.exe not found in archive" }
          New-Item -ItemType Directory -Force -Path publish/ffmpeg | Out-Null
          Copy-Item $exe.FullName -Destination publish/ffmpeg/ffmpeg.exe -Force

      # 2a) YouTube fallback 전용 yt-dlp를 고정 버전/해시로 동봉한다. 앱은 사용자가 입력한
      #     URL이 아니라 자산 카탈로그에 기록된 앱 소유 VOD의 videoId만 전달한다.
      - name: Bundle pinned yt-dlp
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "2026.06.09"
          $expectedSha256 = "3a48cb955d55c8821b60ccbdbbc6f61bc958f2f3d3b7ad5eaf3d83a543293a27"
          $directory = "publish/yt-dlp"
          $executable = "$directory/yt-dlp.exe"
          New-Item -ItemType Directory -Force -Path $directory | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/download/$version/yt-dlp.exe" `
            -OutFile $executable
          $actualSha256 = (Get-FileHash -Algorithm SHA256 -Path $executable).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "yt-dlp.exe SHA-256 mismatch: expected=$expectedSha256 actual=$actualSha256"
          }
          $reportedVersion = (& $executable --version | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $reportedVersion -ne $version) {
            throw "yt-dlp.exe version check failed: expected=$version actual=$reportedVersion"
          }

          # Current yt-dlp requires an external JavaScript runtime for full YouTube support.
          # Deno is enabled by default and is discovered automatically beside yt-dlp.exe.
          $denoVersion = "2.8.1"
          $denoExpectedSha256 = "5fb5bac71f609fb91ec8960fb290885aadc27eeb22f07a8eca0c3db6be38b11a"
          $denoZip = "deno-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/denoland/deno/releases/download/v$denoVersion/$denoZip" `
            -OutFile $denoZip
          $denoActualSha256 = (Get-FileHash -Algorithm SHA256 -Path $denoZip).Hash.ToLowerInvariant()
          if ($denoActualSha256 -ne $denoExpectedSha256) {
            throw "Deno archive SHA-256 mismatch: expected=$denoExpectedSha256 actual=$denoActualSha256"
          }
          Expand-Archive -Path $denoZip -DestinationPath deno_tmp -Force
          Copy-Item deno_tmp/deno.exe "$directory/deno.exe" -Force
          $reportedDenoVersion = (& "$directory/deno.exe" --version | Select-Object -First 1)
          if ($LASTEXITCODE -ne 0 -or -not $reportedDenoVersion.StartsWith("deno $denoVersion")) {
            throw "Deno version check failed: expected=$denoVersion actual=$reportedDenoVersion"
          }
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/yt-dlp/yt-dlp/$version/THIRD_PARTY_LICENSES.txt" `
            -OutFile "$directory/THIRD_PARTY_LICENSES.txt"
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/denoland/deno/v$denoVersion/LICENSE.md" `
            -OutFile "$directory/DENO_LICENSE.md"
          Copy-Item docs/THIRD_PARTY_NOTICES.md publish/THIRD_PARTY_NOTICES.md -Force

      # 2b) cloudflared.exe 를 publish/cloudflared/ 에 동봉(CloudflaredManager 가
      #     BaseDirectory\cloudflared\cloudflared.exe 탐색). remote.mode="cloudflare" 일 때만 사용 —
      #     아웃바운드 터널이라 포트포워딩/방화벽 불필요. Apache-2.0(번들 합법). 재현성 위해 특정
      #     릴리스 태그로 핀하는 것을 권장(여기선 ffmpeg와 동일하게 latest 사용).
      - name: Bundle cloudflared
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path publish/cloudflared | Out-Null
          $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile publish/cloudflared/cloudflared.exe

      # 3) OAuth 데스크톱 클라이언트 시크릿을 동봉(앱이 최초 실행 시 %AppData% 로 1회 복사).
      #    데스크톱 OAuth 시크릿은 사양상 기밀이 아니나, 리포 시크릿으로 주입해 git 추적은 피한다.
      - name: Bundle OAuth client secret
        shell: pwsh
        env:
          CLIENT_SECRET_JSON: ${{ secrets.OAUTH_CLIENT_SECRET_JSON }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CLIENT_SECRET_JSON)) {
            throw "Repo secret OAUTH_CLIENT_SECRET_JSON is not set (Settings > Secrets and variables > Actions)."
          }
          Set-Content -Path publish/client_secret.json -Value $env:CLIENT_SECRET_JSON -Encoding utf8 -NoNewline

      # 3b) Optional first-install room provisioning bootstrap. It has only the HTTPS endpoint;
      #     room tunnel tokens stay in the separately deployed provisioning service. Leaving the
      #     repository variable empty keeps the picker disabled for ordinary/private builds.
      - name: Bundle room provisioning bootstrap
        shell: pwsh
        env:
          ROOM_PROVISIONING_URL: ${{ vars.ROOM_PROVISIONING_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ROOM_PROVISIONING_URL)) {
            Write-Host "ROOM_PROVISIONING_URL is not set; skipping optional room provisioning bootstrap."
            exit 0
          }
          $uri = [Uri]$env:ROOM_PROVISIONING_URL
          if ($uri.Scheme -ne "https" -or -not [string]::IsNullOrWhiteSpace($uri.Query) -or -not [string]::IsNullOrWhiteSpace($uri.Fragment)) {
            throw "ROOM_PROVISIONING_URL must be a clean HTTPS base URL."
          }
          @{ serviceUrl = $uri.AbsoluteUri } | ConvertTo-Json | Set-Content -Path publish/provisioning.json -Encoding utf8

      # 4) Velopack CLI(vpk) — 라이브러리(1.2.0)와 버전을 맞춘다.
      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      # 5) 직전 릴리스를 ./Releases 로 내려받아 델타 업데이트의 베이스로 쓴다(최초 릴리스면 없음 → 무시).
      - name: Download previous release (delta base)
        continue-on-error: true
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token $env:GITHUB_TOKEN

      # 6) Velopack 패키지 생성: Setup.exe + 전체/델타 nupkg + releases.win.json (→ ./Releases).
      - name: Pack with Velopack
        run: >
          vpk pack
          --packId MediaCaptureHelper
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish
          --mainExe MediaCaptureHelper.exe
          --packTitle "Media Capture Helper"
          --packAuthors "Media Capture Helper"

      # 7) GitHub Releases 에 게시(자산 업로드 + 릴리스 발행). 앱은 이 피드를 읽어 자동 업데이트한다.
      - name: Publish to GitHub Releases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token $env:GITHUB_TOKEN
          --publish
          --pre ${{ steps.ver.outputs.pre }}
          --releaseName "Media Capture Helper ${{ steps.ver.outputs.version }}"
          --tag ${{ github.ref_name }}
